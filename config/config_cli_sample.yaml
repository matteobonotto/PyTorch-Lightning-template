model:
  channel_in_list: [1,8,16]
  channel_out_list: [8, 16, 32]
  linear_in_features: 100

data:
  path: ./data/fashion-mnist/fashion-mnist_train.csv
  batch_size: 512
  shuffle: true
  num_workers: 0

trainer:
  accelerator: 'gpu'
  devices: "1"
  strategy: "auto"
  max_epochs: "20"
  # precision: "bf16"
  # pin_memory: True
  callbacks: 
    - class_path: src.callbacks.custom_callbacks.CustomCallback
      init_args:
        refresh_rate: 250



