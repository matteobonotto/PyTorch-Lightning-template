model:
  channel_in_list: [1,16,32]
  channel_out_list: [16, 32, 64]
  linear_in_features: 150

data:
  path: ./data/fashion-mnist/fashion-mnist_196x196_train.h5 
  batch_size: 128
  shuffle: true
  num_workers: 0

trainer:
  accelerator: 'gpu'
  devices: "1"
  strategy: "auto"
  max_epochs: "20"
  # precision: "bf16"
  # pin_memory: True
  callbacks: 
    - class_path: src.callbacks.custom_callbacks.CustomCallback
      init_args:
        refresh_rate: 50



